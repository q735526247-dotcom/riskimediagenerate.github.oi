<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskiMedia AI - Production Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap');
        
        :root {
            --neon-green: #4ade80;
            --gold-bright: #fbbf24; /* Emas Cerah */
            --gold-deep: #d97706;   /* Emas Dalam */
            --deep-forest: #022c22;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #064e3b 0%, #022c22 100%);
            color: #f0fdf4;
            min-height: 100vh;
        }

        h1, h2, h3, .font-heading {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-dark {
            background: rgba(6, 78, 59, 0.3);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(251, 191, 36, 0.2); /* Border Emas Tipis */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .niche-card {
            background: rgba(2, 44, 34, 0.6);
            border: 1px solid rgba(251, 191, 36, 0.1);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .niche-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(251, 191, 36, 0.05);
            border-color: var(--gold-bright);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.2);
        }

        .gradient-text {
            background: linear-gradient(135deg, #fef3c7 0%, #fbbf24 50%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .gold-text {
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        .neon-border-focus:focus {
            outline: none;
            border-color: var(--gold-bright);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        .loader-spin {
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top: 3px solid var(--gold-bright);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .idea-card {
            border: 1px solid rgba(251, 191, 36, 0.1);
            background: rgba(2, 44, 34, 0.4);
            transition: all 0.3s ease;
        }
        .idea-card.selected {
            border-color: var(--gold-bright);
            background: rgba(251, 191, 36, 0.1);
            box-shadow: inset 0 0 20px rgba(251, 191, 36, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #022c22;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.4);
            filter: brightness(1.1);
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #022c22; }
        ::-webkit-scrollbar-thumb { background: #92400e; border-radius: 5px; border: 2px solid #022c22; }
    </style>
</head>
<body class="py-12 px-6">

    <div class="max-w-5xl mx-auto text-center mb-16">
        <h1 class="text-6xl font-extrabold gradient-text mb-4 tracking-tight">RiskiMedia AI</h1>
        <p class="text-xl gold-text font-medium opacity-90 max-w-2xl mx-auto">Transformasi ide menjadi konten sinematik dengan kecerdasan buatan tingkat lanjut.</p>
    </div>

    <!-- NICHE SELECTION -->
    <div id="nicheScreen" class="max-w-6xl mx-auto">
        <h3 class="text-2xl font-bold mb-10 text-center text-white font-heading italic tracking-wide">PILIH NICHE KONTEN ANDA</h3>
        <div id="nicheGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <!-- IDEAS SELECTION SCREEN -->
    <div id="ideasScreen" class="hidden max-w-4xl mx-auto mt-10 p-10 glass-dark rounded-[2.5rem]">
        <h2 class="text-3xl font-bold gradient-text mb-8 text-center font-heading">Eksplorasi Ide Cerita</h2>
        <div id="ideasList" class="grid grid-cols-1 gap-5 mb-10"></div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div>
                <label class="block text-xs font-bold gold-text mb-3 uppercase tracking-widest">Format Layar</label>
                <select id="ratioSelect" class="w-full bg-emerald-950/80 p-4 rounded-2xl border border-emerald-800 text-white font-semibold neon-border-focus appearance-none cursor-pointer">
                    <option value="9:16">9:16 (Shorts/Reels)</option>
                    <option value="16:9">16:9 (Video Reguler)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold gold-text mb-3 uppercase tracking-widest">Estimasi Durasi</label>
                <select id="durationSelect" class="w-full bg-emerald-950/80 p-4 rounded-2xl border border-emerald-800 text-white font-semibold neon-border-focus appearance-none cursor-pointer">
                    <option value="1">1 Menit</option>
                    <option value="3">3 Menit</option>
                    <option value="5">5 Menit</option>
                    <option value="10">10 Menit</option>
                    <option value="15">15 Menit</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold gold-text mb-3 uppercase tracking-widest">Visual Karakter</label>
                <input type="text" id="characterInput" placeholder="Deskripsi fisik tokoh..." 
                       class="w-full bg-emerald-950/80 p-4 rounded-2xl border border-emerald-800 text-white placeholder-emerald-800 font-semibold neon-border-focus">
            </div>
        </div>

        <button onclick="generateFullScript()" id="btnGenerateFull" class="w-full btn-primary py-5 rounded-2xl font-black text-lg shadow-lg">
            Bangun Narasi & Visual
        </button>
    </div>

    <!-- GENERATOR UI -->
    <div id="generatorScreen" class="hidden max-w-5xl mx-auto mt-10 p-10 glass-dark rounded-[2.5rem]">
        <div class="flex flex-col md:flex-row items-center justify-between mb-10 gap-4">
            <h2 id="activeNicheTitle" class="text-3xl font-bold gradient-text font-heading"></h2>
            <button onclick="location.reload()" class="text-sm font-bold text-emerald-950 bg-amber-400 px-6 py-3 rounded-full hover:bg-white transition-colors uppercase tracking-tighter shadow-md">Reset Sesi</button>
        </div>
        
        <div id="topicSection" class="mb-10">
            <div class="relative">
                <input type="text" id="topicInput" placeholder="Ketik topik atau tema utama di sini..." 
                       class="w-full bg-emerald-950/60 p-5 rounded-3xl border border-emerald-800 text-xl text-white focus:outline-none focus:ring-4 ring-amber-500/20 mb-6 placeholder-emerald-900/60 font-semibold">
                <i class="fas fa-magic absolute right-6 top-6 text-amber-500 text-xl"></i>
            </div>
            <button onclick="generateIdeas()" id="btnIdeas" class="w-full btn-primary py-5 rounded-3xl font-black text-xl flex items-center justify-center gap-3">
                GENERATE IDE CERITA
                <div id="ideaLoader" class="loader-spin hidden"></div>
            </button>
        </div>

        <div id="sceneList" class="space-y-12"></div>
    </div>

    <script>
        const apiKey = ""; 
        let selectedNiche = "";
        let selectedIdea = null;
        
        const niches = [
            { id: 'agama', title: 'Edukasi Agama', desc: 'Hikmah & Nilai Luhur', icon: 'fa-mosque' },
            { id: 'kesehatan', title: 'Medis & Kesehatan', desc: 'Sains & Gaya Hidup', icon: 'fa-heart-pulse' },
            { id: 'horor', title: 'Misteri Horor', desc: 'Thriller & Ketegangan', icon: 'fa-ghost' },
            { id: 'dracin', title: 'Drama Sinematik', desc: 'Emosi & Alur Epik', icon: 'fa-film' },
            { id: 'misteri', title: 'Konspirasi Dunia', desc: 'Rahasia Tersembunyi', icon: 'fa-mask' },
            { id: 'anak', title: 'Dunia Anak', desc: 'Animasi & Edukasi', icon: 'fa-child-reaching' },
            { id: 'islami', title: 'Sejarah Islami', desc: 'Kisah Para Pejuang', icon: 'fa-kaaba' },
            { id: 'asmr', title: 'Visual ASMR', desc: 'Relaksasi & Restorasi', icon: 'fa-headphones' },
            { id: 'sains', title: 'Sains Modern', desc: 'Logika & Penemuan', icon: 'fa-atom' },
            { id: 'psikologi', title: 'Psikologi Manusia', desc: 'Mental & Karakter', icon: 'fa-brain' },
            { id: 'bisnis', title: 'Strategi Bisnis', desc: 'Ekonomi & Finansial', icon: 'fa-chart-line' },
            { id: 'biografi', title: 'Tokoh Inspiratif', desc: 'Perjalanan Hidup', icon: 'fa-user-tie' }
        ];

        // Utility: Helper to clean JSON string from AI response
        function cleanJSON(str) {
            try {
                // Remove potential markdown code blocks
                let cleaned = str.replace(/```json/g, '').replace(/```/g, '').trim();
                return JSON.parse(cleaned);
            } catch (e) {
                console.error("JSON Parsing failed", e);
                return null;
            }
        }

        function renderNiches() {
            const grid = document.getElementById('nicheGrid');
            grid.innerHTML = niches.map(n => `
                <div onclick="startGenerator('${n.title}')" class="niche-card p-8 rounded-3xl cursor-pointer text-center group relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-br from-amber-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="mb-4 text-amber-500 text-4xl group-hover:scale-110 transition-transform duration-300">
                        <i class="fas ${n.icon}"></i>
                    </div>
                    <h3 class="font-bold text-lg mb-3 text-emerald-50 group-hover:text-amber-400 font-heading">${n.title}</h3>
                    <p class="text-[10px] text-emerald-400/80 leading-relaxed font-semibold uppercase tracking-widest">${n.desc}</p>
                </div>
            `).join('');
        }

        function startGenerator(title) {
            selectedNiche = title;
            document.getElementById('nicheScreen').classList.add('hidden');
            document.getElementById('generatorScreen').classList.remove('hidden');
            document.getElementById('activeNicheTitle').innerText = title.toUpperCase();
        }

        async function generateIdeas() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;
            
            const loader = document.getElementById('ideaLoader');
            loader.classList.remove('hidden');
            
            const prompt = `Berikan 3 ide cerita unik untuk niche ${selectedNiche} dengan tema ${topic}. Format JSON: {"ideas": [{"title": "Judul Ide", "hook": "Kalimat pembuka"}]}`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                });
                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const result = cleanJSON(rawText);
                if(result && result.ideas) {
                    showIdeasScreen(result.ideas);
                } else {
                    alert("Gagal memproses ide. Coba lagi.");
                }
            } catch (e) { console.error(e); }
            finally { loader.classList.add('hidden'); }
        }

        function showIdeasScreen(ideas) {
            document.getElementById('generatorScreen').classList.add('hidden');
            document.getElementById('ideasScreen').classList.remove('hidden');
            const list = document.getElementById('ideasList');
            list.innerHTML = ideas.map((idea, index) => `
                <div onclick="selectIdea(${index}, this)" class="idea-card p-6 rounded-3xl border cursor-pointer hover:border-amber-400 transition-all group">
                    <h4 class="font-bold text-xl text-white mb-2 font-heading group-hover:text-amber-300 transition-colors">${idea.title}</h4>
                    <p class="text-sm gold-text font-medium italic opacity-80">"${idea.hook}"</p>
                </div>
            `).join('');
            window.tempIdeas = ideas;
        }

        function selectIdea(index, el) {
            document.querySelectorAll('.idea-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedIdea = window.tempIdeas[index];
        }

        async function generateFullScript() {
            if(!selectedIdea) return;
            const charDesc = document.getElementById('characterInput').value;
            const ratio = document.getElementById('ratioSelect').value;
            const duration = document.getElementById('durationSelect').value;
            
            const btn = document.getElementById('btnGenerateFull');
            btn.innerText = "MENYUSUN SKENARIO EMAS...";
            btn.disabled = true;

            const prompt = `Produser Video Profesional. Buat naskah video lengkap untuk niche ${selectedNiche}. 
            Judul: ${selectedIdea.title}. Durasi: ${duration} menit. Rasio: ${ratio}. 
            Karakter utama: ${charDesc}. Konsistensi visual tinggi.
            Buat prompt video untuk AI Video Generator (Flow/Runway).
            JSON: {"scenes": [{"id": 1, "narration": "narasi", "imagePrompt": "prompt HD", "videoPrompt": "prompt video sinematik gerakan kamera"}]}`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                });
                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const result = cleanJSON(rawText);
                
                if (result && result.scenes) {
                    document.getElementById('ideasScreen').classList.add('hidden');
                    document.getElementById('generatorScreen').classList.remove('hidden');
                    document.getElementById('topicSection').classList.add('hidden');
                    renderProduction(result.scenes);
                } else {
                    alert("Gagal menyusun skenario. Coba lagi.");
                }
            } catch (e) { 
                console.error(e); 
                alert("Terjadi kesalahan sistem.");
            }
            finally { 
                btn.disabled = false; 
                btn.innerText = "BANGUN NARASI & VISUAL"; 
            }
        }

        function renderProduction(scenes) {
            const container = document.getElementById('sceneList');
            if (!scenes || !Array.isArray(scenes)) return;
            
            container.innerHTML = scenes.map(s => `
                <div class="bg-emerald-950/20 p-10 rounded-[2.5rem] border border-amber-900/40 shadow-inner relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-2 h-full bg-amber-500"></div>
                    <div class="flex items-center justify-between mb-8">
                        <span class="bg-amber-500 text-emerald-950 text-xs font-black px-4 py-1.5 rounded-full uppercase tracking-tighter shadow-lg shadow-amber-500/20">Scene ${s.id}</span>
                    </div>
                    
                    <div class="grid grid-cols-1 xl:grid-cols-2 gap-12">
                        <div class="space-y-8">
                            <div>
                                <h4 class="text-sm font-black gold-text uppercase mb-4 tracking-[0.2em] flex items-center gap-2">
                                    <i class="fas fa-quote-left text-xs"></i> NARASI VOICEOVER
                                </h4>
                                <div class="text-white text-lg leading-relaxed font-semibold bg-black/30 p-6 rounded-2xl border border-amber-800/20">
                                    ${s.narration}
                                </div>
                            </div>
                            
                            <div>
                                <h4 class="text-sm font-black gold-text uppercase mb-4 tracking-[0.2em] flex items-center gap-2">
                                    <i class="fas fa-video text-xs"></i> PROMPT VIDEO (FLOW)
                                </h4>
                                <div class="relative">
                                    <textarea readonly class="w-full h-32 bg-emerald-950/40 text-[12px] text-amber-200 p-5 rounded-2xl border border-amber-800 focus:outline-none resize-none font-mono leading-relaxed">${s.videoPrompt}</textarea>
                                    <button onclick="copyText(this)" class="absolute top-3 right-3 text-amber-500 hover:text-white p-3 bg-black/40 rounded-xl transition-colors"><i class="fas fa-copy"></i></button>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <h4 class="text-sm font-black gold-text uppercase mb-4 tracking-[0.2em] flex items-center gap-2">
                                <i class="fas fa-eye text-xs"></i> VISUAL PREVIEW
                            </h4>
                            <div id="img-container-${s.id}" class="hidden mb-6 rounded-3xl overflow-hidden border-2 border-amber-800/50 bg-black/40 shadow-2xl">
                                <img id="img-preview-${s.id}" class="w-full h-auto transition-transform hover:scale-105 duration-700" src="">
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="generateVO('${s.narration.replace(/'/g, "\\'")}', ${s.id}, this)" class="bg-amber-900/60 text-white py-4 rounded-2xl font-bold hover:bg-amber-700 transition-all border border-amber-700/50 text-xs uppercase tracking-widest">
                                    <i class="fas fa-microphone mr-2"></i> Voiceover
                                </button>
                                <button onclick="generateImage('${s.imagePrompt.replace(/'/g, "\\'")}', ${s.id}, this)" class="bg-amber-900/60 text-white py-4 rounded-2xl font-bold hover:bg-amber-700 transition-all border border-amber-700/50 text-xs uppercase tracking-widest">
                                    <i class="fas fa-image mr-2"></i> Visual
                                </button>
                            </div>
                            
                            <div class="flex flex-col gap-3">
                                <button id="dl-vo-${s.id}" class="hidden w-full bg-amber-500 text-emerald-950 py-4 rounded-2xl font-black text-xs hover:bg-white transition-all shadow-lg">
                                    SIMPAN AUDIO
                                </button>
                                <button id="dl-img-${s.id}" class="hidden w-full bg-amber-500 text-emerald-950 py-4 rounded-2xl font-black text-xs hover:bg-white transition-all shadow-lg">
                                    SIMPAN GAMBAR
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function copyText(btn) {
            const txt = btn.previousElementSibling;
            txt.select();
            document.execCommand('copy');
            const icon = btn.querySelector('i');
            icon.classList.replace('fa-copy', 'fa-check');
            setTimeout(() => icon.classList.replace('fa-check', 'fa-copy'), 2000);
        }

        async function generateVO(text, id, btn) {
            const original = btn.innerHTML;
            btn.innerHTML = '<div class="loader-spin mx-auto"></div>';
            btn.disabled = true;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
                    })
                });
                const data = await response.json();
                const b64 = data.candidates[0].content.parts.find(p => p.inlineData).inlineData.data;
                const blob = pcmToWav(b64, 24000);
                const url = URL.createObjectURL(blob);
                const dl = document.getElementById(`dl-vo-${id}`);
                dl.classList.remove('hidden');
                dl.onclick = () => { const a = document.createElement('a'); a.href = url; a.download = `RiskiMedia-VO-${id}.wav`; a.click(); };
                new Audio(url).play();
            } catch (e) { alert("Error VO"); }
            finally { btn.innerHTML = original; btn.disabled = false; }
        }

        async function generateImage(prompt, id, btn) {
            const original = btn.innerHTML;
            btn.innerHTML = '<div class="loader-spin mx-auto"></div>';
            btn.disabled = true;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instances: [{ prompt: prompt }], parameters: { sampleCount: 1 } })
                });
                const data = await response.json();
                const b64 = data.predictions[0].bytesBase64Encoded;
                const src = `data:image/png;base64,${b64}`;
                document.getElementById(`img-preview-${id}`).src = src;
                document.getElementById(`img-container-${id}`).classList.remove('hidden');
                const dl = document.getElementById(`dl-img-${id}`);
                dl.classList.remove('hidden');
                dl.onclick = () => { const a = document.createElement('a'); a.href = src; a.download = `RiskiMedia-Img-${id}.png`; a.click(); };
            } catch (e) { alert("Error Gambar"); }
            finally { btn.innerHTML = original; btn.disabled = false; }
        }

        function pcmToWav(b64, rate) {
            const bin = atob(b64); const len = bin.length;
            const bytes = new Uint8Array(len); for(let i=0; i<len; i++) bytes[i] = bin.charCodeAt(i);
            const buffer = new ArrayBuffer(44 + len); const view = new DataView(buffer);
            const str = (off, s) => { for(let i=0; i<s.length; i++) view.setUint8(off+i, s.charCodeAt(i)); };
            str(0, 'RIFF'); view.setUint32(4, 36+len, true); str(8, 'WAVE'); str(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, rate, true); view.setUint32(28, rate*2, true); view.setUint16(32, 2, true);
            view.setUint16(34, 16, true); str(36, 'data'); view.setUint32(40, len, true);
            for(let i=0; i<len; i++) view.setUint8(44+i, bytes[i]);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        renderNiches();
    </script>
</body>
</html>
